services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    ports:
      - 8099:80
    volumes:
      - /:/srv:rw
      - filebrowser_config:/config
    environment:
      - FB_DATABASE=/config/filebrowser.db

volumes:
  filebrowser_config:

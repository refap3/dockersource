services:
  sudoku-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8011:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/config')"]
      interval: 30s
      timeout: 5s
      retries: 3
